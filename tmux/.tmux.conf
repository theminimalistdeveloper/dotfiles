################################################################################
# TMUX
################################################################################

# GENERAL
################################################################################

# Spaces start from 1
set -g base-index 1
# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g focus-events on
# Set the history of the panel to 10k lines
set -g history-limit 10000
# Set VI bindings style
setw -g mode-keys vi
set -g status-keys vi
# Windows with activity are highlighted in the status line.
setw -g monitor-activity on
# No delay for escape key press
set -sg escape-time 0

# ...existing code...

# INTERFACE
################################################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# Status line

# Color definitions
set -g @rosewater "#f2d5cf"
set -g @flamingo "#eebebe"
set -g @pink "#f4b8e4"
set -g @mauve "#ca9ee6"
set -g @red "#e78284"
set -g @maroon "#ea999c"
set -g @peach "#ef9f76"
set -g @yellow "#e5c890"
set -g @green "#a6d189"
set -g @teal "#81c8be"
set -g @sky "#99d1db"
set -g @sapphire "#85c1dc"
set -g @blue "#8caaee"
set -g @lavender "#babbf1"
set -g @text "#c6d0f5"
set -g @subtext1 "#b5bfe2"
set -g @subtext0 "#a5adce"
set -g @overlay2 "#949cbb"
set -g @overlay1 "#838ba7"
set -g @overlay0 "#737994"
set -g @surface2 "#626880"
set -g @surface1 "#51576d"
set -g @surface0 "#414559"
set -g @base "#303446"
set -g @mantle "#292c3c"
set -g @crust "#232634"

# Status bar 1
set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=default,fg=#{@text}"
set -g status-left-length 20
set -g status-right-length 60

set -g status-left "#[bg=default,fg=#{@red},bold] #S "
set -g status-right "#[fg=#{@overlay1}]CPU: #(awk '{print $1}' /proc/loadavg)%% | RAM: #(free | awk '/Mem:/ {printf \"%.0f\", $3/$2 * 100}')%% "

# Window status
set -g window-status-style "bg=default,fg=#{@subtext1}"
set -g window-status-format " #I: #W "
set -g window-status-current-style "bg=default,fg=#{@sapphire},bold"
set -g window-status-current-format " #I:#W "

# Window status separator
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#{@surface1}"
set -g pane-active-border-style "fg=#{@sapphire}"

# Message styling
set -g message-style "bg=default,fg=#{@sapphire}"
set -g message-command-style "bg=default,fg=#{@yellow}"

# Mode styling (copy mode, etc.)
set -g mode-style "bg=default,fg=#{@sapphire},reverse"

# PLUGINS
################################################################################

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
# Plugin to provide seamless navigation between (Neo)Vim and TMUX
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# BINDINGS
################################################################################

# SPLIT
# Map to have similar arrangement as vim bindings
bind-key s split-window -v
bind-key v split-window -h

# RESIZING
# To facilitate resizing
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# PANE SELECTION
# Vim style pane selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# MISC
# Reload tmux config
bind r source-file ~/.tmux.conf
# Show the tree of panes an sessions
bind S choose-tree
